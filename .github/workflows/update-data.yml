name: Update market data

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "latest.html"
      - "src/**"
      - "workers/**"
      - "functions/**"
      - "edge-functions/**"
      - "edgeone.json"
      - "_headers"
      - "data/**"
      - "scripts/*.py"
      - "requirements.txt"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:
    inputs:
      trade_date:
        description: "Optional trade date, for example 2026-07-06"
        required: false
      stats_lookback_days:
        description: "Optional statistics lookback days; default is 370"
        required: false
  schedule:
    - cron: "35 7 * * 1-5"
    - cron: "5 8 * * 1-5"
    - cron: "5 9 * * 1-5"
    - cron: "5 10 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify source encoding
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path("scripts").glob("*.py"):
              path.read_text(encoding="utf-8")
          print("Python source encoding is valid UTF-8")
          PY

      - name: Update data
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.trade_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.trade_date }}"
          fi
          if [ -n "${{ github.event.inputs.stats_lookback_days }}" ]; then
            ARGS="$ARGS --stats-lookback-days ${{ github.event.inputs.stats_lookback_days }}"
          fi
          for attempt in 1 2 3; do
            if python scripts/update_data.py $ARGS --no-history-range; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Data update failed, retrying in 60 seconds ($attempt/3)..."
              sleep 60
            fi
          done
          exit 1

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Commit data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update market data"
          file_pattern: "data/*.json data/history/*.json"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
