name: Update market data

on:
  push:
    branches:
      - main
    paths:
      - "scripts/*.py"
      - "requirements.txt"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:
    inputs:
      trade_date:
        description: "Optional trade date, for example 2026-07-06"
        required: false
      stats_lookback_days:
        description: "Optional statistics lookback days; default is 370"
        required: false
  schedule:
    - cron: "30 7 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.trade_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.trade_date }}"
          fi
          if [ -n "${{ github.event.inputs.stats_lookback_days }}" ]; then
            ARGS="$ARGS --stats-lookback-days ${{ github.event.inputs.stats_lookback_days }}"
          fi
          python scripts/update_data.py $ARGS --no-history-range

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Commit data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update market data"
          file_pattern: "data/*.json data/history/*.json"
