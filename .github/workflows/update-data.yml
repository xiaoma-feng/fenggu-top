name: Update market data

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "latest.html"
      - "favicon.svg"
      - "social-preview.png"
      - "robots.txt"
      - "sitemap.xml"
      - "stock/**"
      - "industry/**"
      - "theme/**"
      - "limit-up/**"
      - "review/**"
      - "8b00f36f35c44d7594da3a76b00677d4.txt"
      - "src/**"
      - "workers/**"
      - "functions/**"
      - "edge-functions/**"
      - "edgeone.json"
      - "_headers"
      - "data/**"
      - "scripts/*.py"
      - "requirements.txt"
      - ".github/workflows/update-data.yml"
  workflow_dispatch:
    inputs:
      trade_date:
        description: "Optional trade date, for example 2026-07-06"
        required: false
      stats_lookback_days:
        description: "Optional statistics lookback days; default is 370"
        required: false
  schedule:
    - cron: "35 7 * * 1-5"
    - cron: "5 8 * * 1-5"
    - cron: "5 9 * * 1-5"
    - cron: "5 10 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify source encoding
        run: |
          python - <<'PY'
          from pathlib import Path
          for path in Path("scripts").glob("*.py"):
              path.read_text(encoding="utf-8")
          print("Python source encoding is valid UTF-8")
          PY

      - name: Update data
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.trade_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.trade_date }}"
          fi
          if [ -n "${{ github.event.inputs.stats_lookback_days }}" ]; then
            ARGS="$ARGS --stats-lookback-days ${{ github.event.inputs.stats_lookback_days }}"
          fi
          for attempt in 1 2 3; do
            if python scripts/update_data.py $ARGS --no-history-range; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Data update failed, retrying in 60 seconds ($attempt/3)..."
              sleep 60
            fi
          done
          exit 1

      - name: Validate data
        run: python scripts/validate_data.py

      - name: Update full A-share stock catalog
        run: python scripts/update_stock_catalog.py || python scripts/update_stock_catalog.py --offline

      - name: Generate static SEO pages
        run: python scripts/generate_seo_pages.py

      - name: Generate SEO sitemap
        run: python scripts/generate_sitemap.py

      - name: Validate static SEO pages
        run: python scripts/validate_seo_pages.py

      - name: Commit data and SEO files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            data/latest.json \
            data/eastmoney-theme-cache.json \
            data/history/*.json \
            data/seo-manifest.json \
            index.html \
            sitemap.xml
          if ! git diff --cached --quiet; then
            git commit -m "chore: update market data"
            git push
          else
            echo "No generated data changes to commit."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: update-data
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set up Python for IndexNow
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Notify IndexNow
        continue-on-error: true
        run: python scripts/submit_indexnow.py --sitemap-url https://xiaoma-feng.github.io/fenggu-top/sitemap.xml
